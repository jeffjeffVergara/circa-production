<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Circa</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0a1628;--card:#111d32;--card2:#182944;--accent:#00c2ff;--accent2:#0099cc;--adim:rgba(0,194,255,.1);--cta:#00d4aa;--danger:#ff4757;--t1:#e4eaf0;--t2:#7a8fa0;--t3:#4a5e70;--brd:#1a2e45;--r:12px;--rs:8px}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto}
.hdr{padding:14px 16px;display:flex;align-items:center;gap:10px;background:linear-gradient(135deg,#0d2137,#0a1a30);border-bottom:1px solid var(--brd);z-index:20}
.hdr-logo{width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--bg)}
.hdr-info{flex:1}.hdr-t{font-size:15px;font-weight:700;color:#fff}.hdr-s{font-size:10px;color:var(--accent);font-weight:600}
.hdr-line{background:var(--adim);border:1px solid rgba(0,194,255,.2);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;color:var(--accent)}
.filt{padding:8px 16px;display:flex;gap:6px;background:var(--bg);border-bottom:1px solid var(--brd)}
.fbtn{flex:1;padding:9px;border-radius:var(--rs);font-size:12px;font-weight:700;border:none;background:var(--card);color:var(--t2);cursor:pointer;text-align:center}
.fbtn.on{background:var(--accent);color:var(--bg)}
.chips{padding:6px 16px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;border:1.5px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;white-space:nowrap}
.chip.on{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.sumbar{padding:8px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--card);border-bottom:1px solid var(--brd)}
.sumbar-l{font-size:12px;color:var(--t2)}.sumbar-l b{color:var(--accent)}
.sumbar-r{padding:7px 16px;border-radius:var(--rs);background:var(--cta);color:var(--bg);font-size:12px;font-weight:700;border:none;cursor:pointer}
.sumbar.hide{display:none}
.search-w{padding:8px 16px 6px;position:relative}
.search-i{width:100%;padding:10px 12px 10px 38px;border-radius:var(--rs);border:1.5px solid var(--brd);background:var(--card);color:var(--t1);font-size:13px;font-family:inherit;outline:none}
.search-i:focus{border-color:var(--accent)}.search-i::placeholder{color:var(--t3)}
.s-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:15px;pointer-events:none}
.main{flex:1;overflow-y:auto;padding:4px 16px 20px;-webkit-overflow-scrolling:touch}
.pc{background:var(--card);border-radius:var(--r);padding:14px;margin-bottom:8px;border:1px solid var(--brd)}
.pc-brand{font-size:9px;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.pc-name{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:10px}
.pc-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pc-units{display:flex;gap:5px;flex-wrap:wrap;flex:1}
.ub{padding:6px 10px;border-radius:var(--rs);font-size:10px;font-weight:600;border:1.5px solid var(--brd);background:transparent;color:var(--t2);cursor:pointer;text-align:center;min-width:58px}
.ub.sel{background:var(--adim);border-color:var(--accent);color:var(--accent)}
.ub-lbl{font-size:9px;display:block;opacity:.7}.ub-pr{font-size:11px;font-weight:700;display:block}
.pc-qty{display:flex;align-items:center;gap:2px}
.qb{width:34px;height:34px;border-radius:50%;border:2px solid var(--cta);background:transparent;color:var(--cta);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qb:active{transform:scale(.9)}
.qb.add{background:var(--cta);color:var(--bg)}
.qb.rm{border-color:var(--danger);color:var(--danger);font-size:14px}
.qv{width:30px;text-align:center;font-size:16px;font-weight:800}
.empty{text-align:center;padding:40px;color:var(--t3);font-size:13px}
.dov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:40;opacity:0;pointer-events:none;transition:opacity .25s}
.dov.open{opacity:1;pointer-events:auto}
.drw{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:480px;max-height:88vh;background:var(--bg);border-radius:16px 16px 0 0;z-index:50;transition:transform .3s cubic-bezier(.32,.72,.24,1);display:flex;flex-direction:column}
.drw.open{transform:translateX(-50%) translateY(0)}
.dh{width:36px;height:4px;border-radius:2px;background:var(--t3);margin:10px auto 6px}
.dtl{padding:0 20px 10px;font-size:16px;font-weight:700;border-bottom:1px solid var(--brd)}
.dit{flex:1;overflow-y:auto;padding:8px 20px}
.di{display:flex;flex-direction:column;gap:6px;padding:10px 0;border-bottom:1px solid var(--brd)}.di:last-child{border:none}
.di-row{display:flex;align-items:center;gap:8px}
.din{flex:1}.dinn{font-size:12px;font-weight:600}.dinu{font-size:10px;color:var(--t2)}
.dis{font-size:13px;font-weight:700;color:var(--accent);min-width:65px;text-align:right}
.df{padding:14px 20px;border-top:1px solid var(--brd)}
.dfr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.dfl{font-size:13px;color:var(--t2)}.dfv{font-size:20px;font-weight:800;color:var(--accent)}
.dfli{font-size:11px;margin-bottom:10px;font-weight:600}
.dfli.ok{color:var(--cta)}.dfli.warn{color:#ffa502}.dfli.bad{color:var(--danger)}
.btn-row{display:flex;gap:8px}
.btn-sec{flex:1;padding:12px;border-radius:var(--rs);background:var(--card);color:var(--t2);font-size:13px;font-weight:600;border:1px solid var(--brd);cursor:pointer;font-family:inherit;text-align:center}
.btn-pri{flex:2;padding:12px;border-radius:var(--rs);background:var(--cta);color:var(--bg);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:inherit}
.btn-pri:disabled{opacity:.5}
.fin-section{background:var(--card);border-radius:var(--r);padding:14px;margin:10px 0}
.fin-title{font-size:13px;font-weight:700;margin-bottom:8px;color:var(--t1)}
.fin-row{display:flex;justify-content:space-between;padding:4px 0;font-size:12px}
.fin-row .lbl{color:var(--t2)}.fin-row .val{font-weight:700}
.fin-row .val.hl{color:var(--accent)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--cta);color:var(--bg);padding:8px 20px;border-radius:20px;font-size:12px;font-weight:600;z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
.pp{padding:7px 10px;border-radius:8px;font-size:11.5px;line-height:1.35;display:flex;align-items:center;gap:6px;margin-top:2px}
.pp.ok{background:rgba(0,212,170,.13);color:#5eead4;border:1px solid rgba(0,212,170,.3)}
.pp.up{background:rgba(251,146,60,.12);color:#fdba74;border:1px solid rgba(251,146,60,.3)}
.pp .pi{font-size:13px;flex-shrink:0}
.pp .pt{flex:1;font-weight:600}
.pc-pills{margin-top:8px;display:flex;flex-direction:column;gap:4px}
</style>
</head>
<body>
<div id="app">
<div class="hdr"><a id="backBtn" href="https://wa.me/51986311567?text=MENU" style="display:none;color:#5B8AF5;font-size:22px;text-decoration:none;margin-right:10px">&#8592;</a><div class="hdr-logo">C</div><div class="hdr-info"><div class="hdr-t">Catalogo Circa</div><div class="hdr-s" id="bN">Cargando...</div></div><div class="hdr-line" id="hL">S/---</div></div>
<div class="filt"><div class="fbtn on" id="fC" onclick="setF('cat')">Categoria</div><div class="fbtn" id="fM" onclick="setF('marca')">Marca</div></div>
<div class="chips" id="cW"></div>
<div class="sumbar hide" id="sB"><div class="sumbar-l" id="sL">0 items</div><button class="sumbar-r" onclick="openD()">Ver carrito</button><button class="btn-clear" onclick="clearCart()" style="background:transparent;border:1px solid #ff4444;color:#ff4444;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;margin-left:8px">Limpiar</button></div>
<div class="search-w"><span class="s-icon">Q</span><input class="search-i" id="sI" type="text" placeholder="Buscar producto o marca..."></div>
<div class="main" id="mA"><div class="empty">Cargando productos...</div></div>
</div>
<div class="dov" id="dO" onclick="closeD()"></div>
<div class="drw" id="dW"><div class="dh"></div><div class="dtl" id="dTl">Tu pedido</div><div class="dit" id="dI"></div>
<div class="df" id="dF"></div></div>
<div class="toast" id="tt"></div>
<script>
var API=location.origin,QS=new URLSearchParams(location.search),BID=QS.get('b')||'b1b2c3d4-0001-4000-8000-000000000001';
var TIPO_OPERACION=(QS.get('t')==='preventa'?'preventa':'venta');
var P=[],cart=[],linea=0,fm='cat',sel='Todos',step='cart',selUnits={};
var CATS=['Todos'];
var promosResult={items:[],ahorro_total:0};
var promoTimer=null;

function $(id){return document.getElementById(id)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function toast(m){var t=$('tt');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1500)}
function fmt(n){return'S/'+n.toFixed(2)}

async function init(){
 try{
  var r=await Promise.all([
   fetch(API+'/api/catalogo?bodega_id='+BID).then(function(r){return r.json()}).catch(function(){return[]}),
   fetch(API+'/api/bodegas/'+BID).then(function(r){return r.json()}).catch(function(){return null})]);
  P=r[0].filter(function(p){return p.activo});
  if(r[1]){linea=r[1].linea_disponible||0;$('bN').textContent=r[1].nombre_comercial||'';$('hL').textContent='S/'+linea.toFixed(2);document.getElementById('backBtn').style.display='inline-block'}
  var shouldLoadCart=new URLSearchParams(location.search).get('repeat')==='1';
  if(shouldLoadCart){try{var sc=await fetch(API+'/api/carrito/'+BID).then(function(r){return r.json()}).catch(function(){return null});
  if(sc&&sc.items){var si=typeof sc.items==='string'?JSON.parse(sc.items):sc.items;
  si.forEach(function(i){cart.push({id:i.catalogo_id,unit:i.pack_size,precio:i.precio||i.precio_unitario||0,nombre:i.nombre||i.producto||'',marca:i.marca||'',qty:i.cantidad||1})});
  if(cart.length){uC();evaluarPromos();toast(cart.length+' producto(s) del pedido anterior');setTimeout(function(){openD()},500)}}}catch(e){console.log('No saved cart')}}
  // Build categories from actual data
  var catSet={};P.forEach(function(p){var c=p.categoria||'Otros';catSet[c]=(catSet[c]||0)+1});
  CATS=['Todos'].concat(Object.keys(catSet).sort(function(a,b){return catSet[b]-catSet[a]}));
  P.sort(function(a,b){return(a.nombre||'').localeCompare(b.nombre||'')});
  bldC();rend();
 }catch(e){$('mA').innerHTML='<div class="empty">Error cargando</div>'}
}

function setF(m){fm=m;sel='Todos';$('fC').classList.toggle('on',m==='cat');$('fM').classList.toggle('on',m==='marca');bldC();rend()}

function bldC(){
 if(fm==='cat'){$('cW').innerHTML=CATS.map(function(c){return'<div class="chip '+(c===sel?'on':'')+'" onclick="pick(\''+c+'\')">'+c+'</div>'}).join('')}
 else{var br={};P.forEach(function(p){var m=p.marca||'?';br[m]=(br[m]||0)+1});
  var s=['Todos'].concat(Object.keys(br).sort(function(a,b){return br[b]-br[a]}));
  $('cW').innerHTML=s.map(function(b){return'<div class="chip '+(b===sel?'on':'')+'" onclick="pick(\''+esc(b)+'\')">'+b+'</div>'}).join('')}
}
function pick(v){sel=v;bldC();rend()}

function filt(){
 var q=$('sI').value.toLowerCase().trim();
 return P.filter(function(p){
  var mc=sel==='Todos'||(fm==='cat'?(p.categoria||'').toLowerCase()===sel.toLowerCase():(p.marca||'').toLowerCase()===sel.toLowerCase());
  var mq=!q||(p.nombre||'').toLowerCase().indexOf(q)>=0||(p.marca||'').toLowerCase().indexOf(q)>=0;
  return mc&&mq});
}

// Devuelve total de unidades de un producto en el cart (sumando todas las variantes de unidad)
function totalQtyForProduct(pid){
 return cart.filter(function(c){return c.id===pid}).reduce(function(s,c){return s+c.qty},0);
}

// HTML de las pills (verde = aplicado, naranja = siguiente escalón) por catalogo_id
function pillHTMLForProduct(pid){
 if(!promosResult||!promosResult.items||!promosResult.items.length)return '';
 // Buscar TODOS los items del cart con este pid (puede haber varios formatos)
 var idxs=[];
 cart.forEach(function(c,i){if(c.id===pid)idxs.push(i)});
 if(!idxs.length)return '';
 var html='';
 // Mostramos las pills del primer item que tenga descuento o siguiente escalón
 // (las reglas son por SKU y todos los formatos del mismo producto comparten regla)
 for(var k=0;k<idxs.length;k++){
  var it=promosResult.items[idxs[k]];
  if(!it)continue;
  if(it.descuento_aplicado){
   html+='<div class="pp ok"><span class="pi">🎁</span><span class="pt">'+esc(it.descuento_aplicado.mensaje)+'</span></div>';
  }
  if(it.siguiente_escalon){
   html+='<div class="pp up"><span class="pi">🎁</span><span class="pt">'+esc(it.siguiente_escalon.mensaje)+'</span></div>';
  }
  if(html)break;  // mostrar solo del primer formato
 }
 return html?'<div class="pc-pills">'+html+'</div>':'';
}

function rend(){
 var l=filt();
 if(!l.length){$('mA').innerHTML='<div class="empty">No hay productos</div>';return}
 $('mA').innerHTML=l.map(function(p){
  var un=p.unidades||{};if(typeof un==='string')try{un=JSON.parse(un)}catch(e){un={}}
  var us=Object.entries(un).sort(function(a,b){
    var o={'UND':0,'TIRA':1,'CJA':2,'DSP':3,'PACK':4};
    var ga=Object.keys(o).find(function(k){return a[0].toUpperCase().indexOf(k)>=0});
    var gb=Object.keys(o).find(function(k){return b[0].toUpperCase().indexOf(k)>=0});
    return(o[ga]===undefined?9:o[ga])-(o[gb]===undefined?9:o[gb])});
  if(!us.length)return'';
  // Determinar formato seleccionado (UND default si existe)
  var defU=us[0][0];
  us.forEach(function(u){if(u[0].toUpperCase().indexOf('UND')===0)defU=u[0]});
  var su=selUnits[p.id]||defU;
  // Buscar en cart por id+unit (FIX: su ya está definido aquí, ANTES de buscar)
  var ci=cart.find(function(c){return c.id===p.id&&c.unit===su});
  var sp=un[su]||us[0][1];
  var qThisFormat=ci?ci.qty:0;
  var qTotal=totalQtyForProduct(p.id);
  var pills=pillHTMLForProduct(p.id);
  return'<div class="pc"><div class="pc-brand">'+esc(p.marca||'')+'</div><div class="pc-name">'+esc(p.nombre||'')+'</div>'+
   '<div class="pc-row"><div class="pc-units">'+us.map(function(u){return'<button class="ub '+(u[0]===su?'sel':'')+'" onclick="sU(\''+p.id+'\',\''+esc(u[0])+'\','+u[1]+')"><span class="ub-lbl">'+esc(u[0])+'</span><span class="ub-pr">'+fmt(u[1])+'</span></button>'}).join('')+'</div>'+
   '<div class="pc-qty">'+(qThisFormat>0?
    '<button class="qb rm" onclick="cQ(\''+p.id+'\',-1,\''+su+'\')">'+(qThisFormat===1?'X':'-')+'</button><span class="qv">'+qThisFormat+'</span><button class="qb" onclick="cQ(\''+p.id+'\',1,\''+su+'\')">+</button>':
    '<button class="qb add" onclick="aTC(\''+p.id+'\',\''+esc(su)+'\','+sp+',\''+esc(p.nombre)+'\',\''+esc(p.marca)+'\')">+</button>'
   )+'</div></div>'+pills+'</div>';
 }).join('');
}

$('sI').addEventListener('input',function(){rend()});

function aTC(id,u,pr,n,m){var key=id+'_'+u;var x=cart.find(function(c){return(c.id+'_'+c.unit)===key});if(x){x.qty++;x.precio=pr}else cart.push({id:id,unit:u,precio:pr,nombre:n,marca:m,qty:1});toast(n.slice(0,20)+' agregado');uC();rend();evaluarPromos()}
function sU(id,u,pr){selUnits[id]=u;var i=cart.find(function(c){return c.id===id&&c.unit===u});if(i){i.precio=pr}rend()}
function cQ(id,d,u){var key=id+'_'+(u||'');var i=cart.find(function(c){return(c.id+'_'+c.unit)===key});if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(function(c){return(c.id+'_'+c.unit)!==key});uC();rend();evaluarPromos()}

function clearCart(){cart=[];promosResult={items:[],ahorro_total:0};uC();rend();toast('Carrito limpiado');fetch(API+'/api/carrito/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bodega_id:BID})}).catch(function(){})}
function goBack(){window.close();window.location.href='https://wa.me/51986311567?text=MENU'}
function uC(){
 var t=cart.reduce(function(s,c){return s+c.precio*c.qty},0),n=cart.reduce(function(s,c){return s+c.qty},0);
 if(n>0){$('sB').classList.remove('hide');$('sL').innerHTML=n+' items - <b>'+fmt(t)+'</b>'}
 else $('sB').classList.add('hide');
}

// Llama al backend para evaluar promociones (debounced 250ms)
function evaluarPromos(){
 if(promoTimer)clearTimeout(promoTimer);
 promoTimer=setTimeout(function(){
  if(!cart.length){promosResult={items:[],ahorro_total:0};rend();return}
  var body={bodega_id:BID,cart:cart.map(function(c){return{catalogo_id:c.id,cantidad:c.qty,formato:c.unit,precio_unitario_formato:c.precio}})};
  fetch(API+'/api/promociones/evaluar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
   .then(function(r){return r.json()})
   .then(function(j){promosResult=j||{items:[],ahorro_total:0};rend();if(step==='cart'&&$('dW').classList.contains('open'))rD()})
   .catch(function(){})
 },250)
}

function openD(){step='cart';rD();$('dO').classList.add('open');$('dW').classList.add('open');evaluarPromos()}
function closeD(){$('dO').classList.remove('open');$('dW').classList.remove('open')}

// HTML de la pill DENTRO del item del drawer
function pillHTMLForCartItem(idx){
 if(!promosResult||!promosResult.items||!promosResult.items[idx])return '';
 var it=promosResult.items[idx];
 var html='';
 if(it.descuento_aplicado){
  html+='<div class="pp ok"><span class="pi">🎁</span><span class="pt">'+esc(it.descuento_aplicado.mensaje)+'</span></div>';
 }
 if(it.siguiente_escalon){
  html+='<div class="pp up"><span class="pi">🎁</span><span class="pt">'+esc(it.siguiente_escalon.mensaje)+'</span></div>';
 }
 return html;
}

function rD(){
 var t=cart.reduce(function(s,c){return s+c.precio*c.qty},0),n=cart.reduce(function(s,c){return s+c.qty},0);
 var ahorro=(promosResult&&promosResult.ahorro_total)||0;
 if(step==='cart'){
  $('dTl').textContent='Tu pedido';
  $('dI').innerHTML=cart.map(function(c,idx){
   return'<div class="di"><div class="di-row"><div class="din"><div class="dinn">'+esc(c.nombre)+'</div><div class="dinu">'+esc(c.unit)+' - '+fmt(c.precio)+'</div></div>'+
   '<div class="pc-qty"><button class="qb rm" onclick="dQ(\''+c.id+'\',-1,\''+c.unit+'\')" style="width:26px;height:26px;font-size:12px">'+(c.qty===1?'X':'-')+'</button><span class="qv" style="width:26px;font-size:13px">'+c.qty+'</span><button class="qb" onclick="dQ(\''+c.id+'\',1,\''+c.unit+'\')" style="width:26px;height:26px;font-size:12px">+</button></div>'+
   '<div class="dis">'+fmt(c.precio*c.qty)+'</div></div>'+
   pillHTMLForCartItem(idx)+
   '</div>'}).join('');
  var dl=t<=linea?'<div class="dfli ok">Todo financiable — tope Circa: '+fmt(linea)+'</div>':
   linea>0?'<div class="dfli warn">Financiable hasta '+fmt(linea)+'</div>':'<div class="dfli bad">Sin tope disponible</div>';
  var ahorroLine=ahorro>0?'<div class="dfr"><span class="dfl" style="color:#5eead4">🎁 Ahorras</span><span class="dfv" style="color:#5eead4;font-size:14px">'+fmt(ahorro)+'</span></div>':'';
  $('dF').innerHTML='<div class="dfr"><span class="dfl">Total ('+n+' uds)</span><span class="dfv">'+fmt(t)+'</span></div>'+ahorroLine+dl+
   '<div class="btn-row"><button class="btn-sec" onclick="closeD()">Seguir comprando</button><button class="btn-pri" onclick="goFin()">Continuar</button></div>';
 }else if(step==='summary'){
  $('dTl').textContent='Resumen del pedido';
  $('dI').innerHTML='<div class="fin-section"><div class="fin-title">Productos</div>'+
   cart.map(function(c){return'<div class="fin-row"><span class="lbl">'+c.qty+'x '+esc(c.nombre).slice(0,28)+'</span><span class="val">'+fmt(c.precio*c.qty)+'</span></div>'}).join('')+
   '<div class="fin-row" style="border-top:1px solid var(--brd);padding-top:6px;margin-top:4px"><span class="lbl"><b>Total del pedido</b></span><span class="val hl"><b>'+fmt(t)+'</b></span></div></div>'+
   '<div style="text-align:center;padding:10px 0;font-size:12px;color:var(--t2)">En el siguiente paso te ayudamos<br>a financiar tu compra con Circa</div>';
  $('dF').innerHTML='<div class="btn-row"><button class="btn-sec" onclick="step=\'cart\';rD()">Editar pedido</button><button class="btn-pri" id="cfB" onclick="cfmOrder()">Continuar pedido</button></div>';
 }
}
function dQ(id,d,u){cQ(id,d,u);if(!cart.length)closeD();else rD()}
function goFin(){step='summary';rD()}

async function cfmOrder(){
 var b=$('cfB');b.disabled=true;b.textContent='Procesando...';
 try{
  var items=cart.map(function(c){return{catalogo_id:c.id,nombre:c.nombre,marca:c.marca,pack_size:c.unit,cantidad:c.qty,precio:c.precio,subtotal:c.precio*c.qty}});
  await fetch(API+'/api/catalogo/submit-cart',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bodega_id:BID,items:items,tipo_operacion:TIPO_OPERACION})});
  $('dTl').textContent='Carrito listo';
  $('dI').innerHTML='<div style="text-align:center;padding:24px 0"><div style="font-size:44px;margin-bottom:10px">🛒</div><div style="font-size:15px;font-weight:700;margin-bottom:8px;color:var(--accent)">Carrito listo</div><div style="font-size:12px;color:var(--t2);line-height:1.5">Avancemos con el pago. Elige tu plazo y confirma<br>con tu clave Circa en el chat.</div></div>';
  $('dF').innerHTML='<button class="btn-pri" onclick="location.href=\x27https://wa.me/51986311567\x27" style="width:100%">Avanzar con el pago</button>';
  cart=[];promosResult={items:[],ahorro_total:0};uC();rend();
 }catch(e){b.disabled=false;b.textContent='Continuar pedido';toast('Error al enviar')}
}

init();
</script>
</body>
</html>
