<style>

.qb:active{transform:scale(.9)}

<body>
<div id="app">
<div class="hdr"><a id="backBtn" href="https://wa.me/51986311567?text=MENU" style="display:none;color:#5B8AF5;font-size:22px;text-decoration:none;margin-right:10px">&#8592;</a><div class="hdr-logo">C</div><div class="hdr-info"><div class="hdr-t">Catalogo Circa</div><div class="hdr-s" id="bN">Cargando...</div></div><div class="hdr-line" id="hL">S/---</div></div>
<div class="filt"><div class="fbtn on" id="fC" onclick="setF('cat')">Categoria</div><div class="fbtn" id="fM" onclick="setF('marca')">Marca</div></div>
<div class="chips" id="cW"></div>
<div class="sumbar hide" id="sB"><div class="sumbar-top"><div class="sumbar-l" id="sL">0 items</div><button type="button" class="btn-clear" onclick="clearCart()">Limpiar</button></div><button type="button" class="sumbar-r" onclick="openD()"><span class="sumbar-ico" aria-hidden="true">🛒</span><span>Ver carrito</span></button></div>
<div class="search-w"><span class="s-icon" aria-hidden="true"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4.3-4.3"/></svg></span><input class="search-i" id="sI" type="text" placeholder="Buscar (palabras, sin tildes ni apóstrofos)..." enterkeyhint="search" autocomplete="off"></div>

</div>

<div class="drw" id="dW"><div class="dh"></div><div class="dtl" id="dTl">Tu pedido</div><div class="dit" id="dI"></div>
<div class="df" id="dF"></div></div>
<div class="toast" id="tt"></div>
<script>
var API=location.origin,QS=new URLSearchParams(location.search),BID=QS.get('b')||'b1b2c3d4-0001-4000-8000-000000000001';
var TIPO_OPERACION=(QS.get('t')==='preventa'?'preventa':'venta');
var P=[],cart=[],linea=0,fm='cat',sel='Todos',step='cart',selUnits={};
var CATS=['Todos'];
var promosResult={items:[],ahorro_total:0,bonificaciones_aplicables:[],bonificaciones_proximas:[],valor_bonificaciones:0};
var promoTimer=null;
var carritoSyncTimer=null;

function $(id){return document.getElementById(id)}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
/** Escape for strings inside onclick="...'here'..." — do not use esc() there: &#39; breaks after HTML decode */
function escJS(s){return String(s==null?'':s).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\r/g,'\\r').replace(/\n/g,'\\n')}
/** Double-quoted HTML attributes: &-safe, no &#39; (dataset/apostrophe friendly) */
function escAttr(s){return(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function toast(m){var t=$('tt');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1500)}
function fmt(n){return'S/'+n.toFixed(2)}
function sendEvent(ev,meta){
 try{
  fetch(API+'/api/analytics/event',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({bodega_id:BID,event_type:ev,metadata:meta||{}})
  });
 }catch(e){}
}

function cartToApiItems(){
 return cart.map(function(c){
  return{catalogo_id:c.id,pack_size:c.unit,nombre:c.nombre,marca:c.marca,cantidad:c.qty,precio:c.precio,subtotal:c.precio*c.qty};
 });
}

function flushCartSyncNow(){
 if(carritoSyncTimer){clearTimeout(carritoSyncTimer);carritoSyncTimer=null}
 if(!BID)return;
 try{
  if(!cart.length){
   fetch(API+'/api/carrito/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bodega_id:BID}),keepalive:true}).catch(function(){});
   return;
  }
  fetch(API+'/api/carrito/save',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({bodega_id:BID,items:cartToApiItems()}),
   keepalive:true
  }).catch(function(){});
 }catch(e){}
}

function syncCartToServer(){
 if(carritoSyncTimer)clearTimeout(carritoSyncTimer);
 carritoSyncTimer=setTimeout(function(){
  carritoSyncTimer=null;
  if(!BID)return;
  if(!cart.length){
   fetch(API+'/api/carrito/clear',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({bodega_id:BID})}).catch(function(){});
   return;
  }
  fetch(API+'/api/carrito/save',{
   method:'POST',
   headers:{'Content-Type':'application/json'},
   body:JSON.stringify({bodega_id:BID,items:cartToApiItems()})
  }).catch(function(){});
 },400);
}

function parseProductUnidades(p){
 var un=p&&p.unidades||{};
 if(typeof un==='string'){try{un=JSON.parse(un)}catch(e){un={}}}
 return un&&typeof un==='object'?un:{};
}

/** Alinea pack_size guardado con las claves reales de catalogo_distribuidor.unidades (ej. "12" → "CJA x 12"). */
function matchUnitKey(rawUnit, un){
 var keys=Object.keys(un);
 if(!keys.length)return rawUnit==null?'':String(rawUnit);
 var ru=rawUnit==null?'':String(rawUnit).trim();
 if(ru&&keys.indexOf(ru)>=0)return ru;
 var rul=ru.toLowerCase();
 var i;
 for(i=0;i<keys.length;i++){
  if(keys[i].toLowerCase()===rul)return keys[i];
 }
 var num=parseInt(ru,10);
 if(!isNaN(num)&&num>0){
  for(i=0;i<keys.length;i++){
   var k=keys[i];
   var m=k.match(/x\s*(\d+)/i);
   if(m&&parseInt(m[1],10)===num)return k;
   var tail=k.match(/(\d+)\s*$/);
   if(tail&&parseInt(tail[1],10)===num)return k;
  }
 }
 for(i=0;i<keys.length;i++){
  if(keys[i].toUpperCase().indexOf(ru.toUpperCase())===0)return keys[i];
 }
 return keys[0];
}

function normalizeLoadedCartUnits(){
 if(!P||!P.length||!cart.length)return;
 cart.forEach(function(c){
  var p=P.find(function(x){return String(x.id)===String(c.id)});
  if(!p)return;
  var un=parseProductUnidades(p);
  var mu=matchUnitKey(c.unit, un);
  if(mu&&un[mu]!=null){
   c.unit=mu;
   var pr=parseFloat(un[mu]);
   if(!isNaN(pr))c.precio=pr;
  }
 });
 cart.forEach(function(c){if(c.id!=null)selUnits[String(c.id)]=c.unit});
}

async function loadCartFromServer(){
 try{
  var sc=await fetch(API+'/api/carrito/'+BID).then(function(r){return r.json()}).catch(function(){return null});
  if(!sc||!sc.items)return;
  var si=typeof sc.items==='string'?JSON.parse(sc.items):sc.items;
  for(var d=0;d<3&&typeof si==='string';d++){try{si=JSON.parse(si)}catch(e){return}}
  if(!si||!Array.isArray(si)||!si.length)return;
  cart.length=0;
  si.forEach(function(i){
   var cid=i.catalogo_id||i.id;
   if(!cid)return;
   var u=i.pack_size!=null&&i.pack_size!==''?i.pack_size:(i.unit!=null&&i.unit!==''?i.unit:(i.formato||''));
   cart.push({id:String(cid),unit:u,precio:parseFloat(i.precio||i.precio_unitario||0)||0,nombre:i.nombre||i.producto||'',marca:i.marca||'',qty:parseInt(i.cantidad||i.qty||1,10)||1});
  });
  normalizeLoadedCartUnits();
  uC();evaluarPromos();
  var fromRepeat=QS.get('repeat')==='1';
  if(fromRepeat){
   toast(cart.length+' producto(s) del pedido anterior');
   setTimeout(function(){openD()},500);
  }
 }catch(e){console.log('No saved cart',e)}
}

async function init(){
 try{
  sendEvent('catalog_opened',{tipo_operacion:TIPO_OPERACION});
  var r=await Promise.all([
   fetch(API+'/api/catalogo?bodega_id='+BID).then(function(r){return r.json()}).catch(function(){return[]}),
   fetch(API+'/api/bodegas/'+BID).then(function(r){return r.json()}).catch(function(){return null})]);
  P=r[0].filter(function(p){return p.activo});
  if(r[1]){linea=r[1].linea_disponible||0;$('bN').textContent=r[1].nombre_comercial||'';$('hL').textContent='S/'+linea.toFixed(2);document.getElementById('backBtn').style.display='inline-block'}
  await loadCartFromServer();
  // Build categories from actual data
  var catSet={};P.forEach(function(p){var c=p.categoria||'Otros';catSet[c]=(catSet[c]||0)+1});
  CATS=['Todos'].concat(Object.keys(catSet).sort(function(a,b){return catSet[b]-catSet[a]}));
  P.sort(function(a,b){return(a.nombre||'').localeCompare(b.nombre||'')});
  bldC();rend();
 }catch(e){$('mA').innerHTML='<div class="empty">Error cargando</div>'}
}

function setF(m){fm=m;sel='Todos';$('fC').classList.toggle('on',m==='cat');$('fM').classList.toggle('on',m==='marca');bldC();rend()}

function bldC(){
 if(fm==='cat'){$('cW').innerHTML=CATS.map(function(c){return'<div class="chip '+(c===sel?'on':'')+'" onclick="pick(\''+escJS(c)+'\')">'+esc(c)+'</div>'}).join('')}
 else{var br={};P.forEach(function(p){var m=p.marca||'?';br[m]=(br[m]||0)+1});
  var s=['Todos'].concat(Object.keys(br).sort(function(a,b){return br[b]-br[a]}));
  $('cW').innerHTML=s.map(function(b){return'<div class="chip '+(b===sel?'on':'')+'" onclick="pick(\''+escJS(b)+'\')">'+esc(b)+'</div>'}).join('')}
}
function pick(v){sel=v;bldC();rend()}

/** Quita tildes para comparar "café" con "cafe". */
function stripDiacritics(s){
 try{return String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'')}catch(e){return String(s||'')}
}
/** Texto listo para buscar: minúsculas, sin acentos ni apóstrofos (l'oreal ≈ loreal), solo letras/números y espacios. */
function normBusqueda(s){
 var t=stripDiacritics(String(s||'').toLowerCase());
 t=t.replace(/[''`´]/g,'').replace(/[\u2019\u2018\u2032]/g,'');
 return t.replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim()
}
/** Distancia Levenshtein con tope (barato para catálogos &lt; ~500 ítems). */
function levDist(a,b,max){
 max=max==null?2:max;
 var n=a.length,m=b.length,i,j,prev,row,rowMin;
 if(!n)return m<=max?m:max+1;
 if(!m)return n<=max?n:max+1;
 if(Math.abs(n-m)>max)return max+1;
 prev=new Array(m+1);
 for(j=0;j<=m;j++)prev[j]=j;
 for(i=1;i<=n;i++){
  row=new Array(m+1);row[0]=i;rowMin=i;
  var ai=a.charAt(i-1);
  for(j=1;j<=m;j++){
   var cost=ai===b.charAt(j-1)?0:1;
   var v=Math.min(prev[j]+1,row[j-1]+1,prev[j-1]+cost);
   row[j]=v;if(v<rowMin)rowMin=v;
  }
  if(rowMin>max)return max+1;
  prev=row;
 }
 return prev[m]<=max?prev[m]:max+1;
}
/** ¿Coincide una palabra buscada con el texto del producto (flexible)? */
function coincideToken(token,hayFull,hayWords){
 if(!token)return true;
 if(hayFull.indexOf(token)>=0)return true;
 var wi,wl=hayWords.length,w,tlen=token.length;
 for(wi=0;wi<wl;wi++){
  w=hayWords[wi];if(!w)continue;
  if(w.indexOf(token)>=0)return true;
  if(token.indexOf(w)>=0&&w.length>=3)return true;
  if(tlen>=3&&w.length>=tlen&&w.indexOf(token)===0)return true;
  if(tlen>=4&&w.length>=4){
   var mx=tlen<=5?1:2;
   if(levDist(token,w,mx)<=mx)return true;
  }
 }
 return false;
}

function filt(){
 var qRaw=$('sI').value.trim();
 var qNorm=normBusqueda(qRaw);
 var tokens=qNorm?qNorm.split(/\s+/).filter(function(t){return t.length>=2}):[];
 return P.filter(function(p){
  var mc=sel==='Todos'||(fm==='cat'?(p.categoria||'').toLowerCase()===sel.toLowerCase():(p.marca||'').toLowerCase()===sel.toLowerCase());
  if(!mc)return false;
  if(!tokens.length){
   if(!qNorm)return true;
   var hayOne=normBusqueda((p.nombre||'')+' '+(p.marca||'')+' '+(p.categoria||''));
   return hayOne.indexOf(qNorm)>=0;
  }
  var hay=normBusqueda((p.nombre||'')+' '+(p.marca||'')+' '+(p.categoria||''));
  var words=hay.split(/\s+/).filter(function(x){return x.length>0});
  var ti;
  for(ti=0;ti<tokens.length;ti++){
   if(!coincideToken(tokens[ti],hay,words))return false;
  }
  return true;
 });
}

// Devuelve total de unidades de un producto en el cart (sumando todas las variantes de unidad)
function totalQtyForProduct(pid){
 return cart.filter(function(c){return String(c.id)===String(pid)}).reduce(function(s,c){return s+c.qty},0);
}

// HTML de las pills (verde = aplicado, naranja = siguiente escalón) por catalogo_id
function pillHTMLForProduct(pid){
 if(!promosResult||!promosResult.items||!promosResult.items.length)return '';
 // Buscar TODOS los items del cart con este pid (puede haber varios formatos)
 var idxs=[];
 cart.forEach(function(c,i){if(String(c.id)===String(pid))idxs.push(i)});
 if(!idxs.length)return '';
 var html='';
 // Mostramos las pills del primer item que tenga descuento o siguiente escalón
 // (las reglas son por SKU y todos los formatos del mismo producto comparten regla)
 for(var k=0;k<idxs.length;k++){
  var it=promosResult.items[idxs[k]];
  if(!it)continue;
  if(it.descuento_aplicado){
   html+='<div class="pp ok"><span class="pi">🎁</span><span class="pt">'+esc(it.descuento_aplicado.mensaje)+'</span></div>';
  }
  if(it.siguiente_escalon){
   html+='<div class="pp up"><span class="pi">🎁</span><span class="pt">'+esc(it.siguiente_escalon.mensaje)+'</span></div>';
  }
  if(html)break;  // mostrar solo del primer formato
 }
 return html?'<div class="pc-pills">'+html+'</div>':'';
}

function rend(){
 var l=filt();
 if(!l.length){$('mA').innerHTML='<div class="empty">No hay productos</div>';return}
 $('mA').innerHTML=l.map(function(p){
  var un=p.unidades||{};if(typeof un==='string')try{un=JSON.parse(un)}catch(e){un={}}
  var us=Object.entries(un).sort(function(a,b){
    var o={'UND':0,'TIRA':1,'DSP':2,'CJA':3,'PACK':4};
    var ga=Object.keys(o).find(function(k){return a[0].toUpperCase().indexOf(k)>=0});
    var gb=Object.keys(o).find(function(k){return b[0].toUpperCase().indexOf(k)>=0});
    return(o[ga]===undefined?9:o[ga])-(o[gb]===undefined?9:o[gb])});
  if(!us.length)return'';
  // Determinar formato seleccionado (UND default si existe)
  var defU=us[0][0];
  us.forEach(function(u){if(u[0].toUpperCase().indexOf('UND')===0)defU=u[0]});
  var su=selUnits[String(p.id)]||defU;
  // Buscar en cart por id+unit — IDs como string para coincidir con carrito hidratado
  var ci=cart.find(function(c){return String(c.id)===String(p.id)&&c.unit===su});
  var sp=un[su]||us[0][1];
  var qThisFormat=ci?ci.qty:0;
  var qTotal=totalQtyForProduct(p.id);
  var pills=pillHTMLForProduct(p.id);
  return'<div class="pc"><div class="pc-brand">'+esc(p.marca||'')+'</div><div class="pc-name">'+esc(p.nombre||'')+'</div>'+
   '<div class="pc-row"><div class="pc-units">'+us.map(function(u){return'<button class="ub '+(u[0]===su?'sel':'')+'" onclick="sU(\''+escJS(p.id)+'\',\''+escJS(u[0])+'\','+u[1]+')"><span class="ub-lbl">'+esc(u[0])+'</span><span class="ub-pr">'+fmt(u[1])+'</span></button>'}).join('')+'</div>'+
   '<div class="pc-qty">'+(qThisFormat>0?
    '<button class="qb rm" onclick="cQ(\''+escJS(p.id)+'\',-1,\''+escJS(su)+'\')">'+(qThisFormat===1?'X':'-')+'</button><span class="qv">'+qThisFormat+'</span><button class="qb" onclick="cQ(\''+escJS(p.id)+'\',1,\''+escJS(su)+'\')">+</button>':
    '<button class="qb add" data-id="'+escAttr(p.id)+'" data-su="'+escAttr(su)+'" data-pr="'+sp+'" data-nombre="'+escAttr(p.nombre)+'" data-marca="'+escAttr(p.marca)+'" onclick="aTCFromBtn(this)">+</button>'
   )+'</div></div>'+pills+'</div>';
 }).join('');
}

function aTC(id,u,pr,n,m){
 id=String(id);
 var key=id+'_'+u;var x=cart.find(function(c){return String(c.id)+'_'+c.unit===key});
 if(x){x.qty++;x.precio=pr}else cart.push({id:id,unit:u,precio:pr,nombre:n,marca:m,qty:1});
 sendEvent('product_added',{catalogo_id:id,nombre:n,unidad:u,precio:pr,tipo_operacion:TIPO_OPERACION});toast(n.slice(0,20)+' agregado');uC();rend();evaluarPromos();syncCartToServer()}
function aTCFromBtn(btn){aTC(btn.dataset.id,btn.dataset.su,parseFloat(btn.dataset.pr),btn.dataset.nombre,btn.dataset.marca)}
function sU(id,u,pr){selUnits[String(id)]=u;var i=cart.find(function(c){return String(c.id)===String(id)&&c.unit===u});if(i){i.precio=pr;syncCartToServer()}rend()}
function cQ(id,d,u){
 id=String(id);var key=id+'_'+(u||'');

 if(!i)return;i.qty+=d;if(i.qty<=0)cart=cart.filter(function(c){return String(c.id)+'_'+c.unit!==key});uC();rend();evaluarPromos();syncCartToServer()}

// Llama al backend para evaluar promociones (debounced 250ms)
function evaluarPromos(){
 if(promoTimer)clearTimeout(promoTimer);
 promoTimer=setTimeout(function(){
  if(!cart.length){promosResult={items:[],ahorro_total:0,bonificaciones_aplicables:[],bonificaciones_proximas:[],valor_bonificaciones:0};rend();return}
  var body={bodega_id:BID,cart:cart.map(function(c){return{catalogo_id:c.id,cantidad:c.qty,formato:c.unit,precio_unitario_formato:c.precio}})};
  fetch(API+'/api/promociones/evaluar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
   .then(function(r){return r.json()})
   .then(function(j){promosResult=j||{items:[],ahorro_total:0,bonificaciones_aplicables:[],bonificaciones_proximas:[],valor_bonificaciones:0};rend();if(step==='cart'&&$('dW').classList.contains('open'))rD()})
   .catch(function(){})
 },250)
}
